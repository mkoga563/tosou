<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>部品写真登録</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
    font-family:sans-serif;
    max-width:700px;
    margin:auto;
    padding:20px;
}

h2{
    margin-top:40px;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    font-size:18px;
    box-sizing:border-box;
}

img{
    width:100%;
    margin-top:10px;
    border:1px solid #ccc;
}

#msg{
    margin-top:15px;
    font-weight:bold;
}

/* QRコード表示 */

#qrcodeBox{
    position:fixed;
    top:10px;
    right:10px;
    background:#fff;
    border:1px solid #ccc;
    padding:5px;
    z-index:1000;
    box-shadow:0 0 5px rgba(0,0,0,0.2);
}

#qrcodeLabel{
    text-align:center;
    font-size:12px;
    margin-top:4px;
}

</style>
</head>

<body>

<div id="qrcodeBox">
    <div id="qrcode"></div>
    <div id="qrcodeLabel">このアプリ</div>
</div>

<h2>部品写真登録</h2>

<input
    id="partNo"
    type="text"
    placeholder="部品番号を入力">

<input
    type="file"
    id="camera"
    accept="image/*"
    capture="environment">

<img id="preview">

<button onclick="savePDF()">
PDF保存
</button>

<div id="msg"></div>

<script>

let imageBase64 = "";

/* QRコード生成 */

new QRCode(
    document.getElementById("qrcode"),
    {
        text: window.location.href,
        width: 100,
        height: 100
    }
);

/* 画像選択 */

document
.getElementById("camera")
.addEventListener("change", function(e){

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(ev){

        imageBase64 = ev.target.result;

        document
            .getElementById("preview")
            .src = imageBase64;

    };

    reader.readAsDataURL(file);

});

/* PDF作成 */

async function savePDF(){

    const partNo =
        document.getElementById("partNo")
        .value.trim();

    if(partNo === ""){
        alert("部品番号を入力してください");
        return;
    }

    if(imageBase64 === ""){
        alert("写真を撮影してください");
        return;
    }

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF();

    pdf.setFontSize(16);

    pdf.text(
        "Part No : " + partNo,
        10,
        15
    );

    pdf.text(
        "Date : " +
        new Date().toLocaleString(),
        10,
        25
    );

    pdf.addImage(
        imageBase64,
        "JPEG",
        10,
        35,
        180,
        120
    );

    const pdfBlob =
        pdf.output("blob");

    uploadPDF(
        pdfBlob,
        partNo + ".pdf"
    );

}

/* Google Driveアップロード */

function uploadPDF(blob,fileName){

    const reader =
        new FileReader();

    reader.onloadend = function(){

        fetch(
            "https://script.google.com/macros/s/AKfycbyJ0dpMOokO27qe3mn3vNcuyJaTyO1L1bTZBuoW6L0vCRGEz0bQ1Y4CR8cATcL30VtXAQ/exec",
            {
                method:"POST",
                body:JSON.stringify({
                    filename:fileName,
                    data:reader.result
                })
            }
        )
        .then(res => res.text())
        .then(msg => {

            document
                .getElementById("msg")
                .innerHTML =
                "✔ " + msg;

        })
        .catch(err => {

            console.error(err);

            document
                .getElementById("msg")
                .innerHTML =
                "保存失敗";

        });

    };

    reader.readAsDataURL(blob);

}

</script>

</body>
</html>
